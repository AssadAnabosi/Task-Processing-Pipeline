name: ci

on:
  pull_request:
    branches: [main]

jobs:
  style:
    name: Prettier Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Install dependencies
        run: bun ci

      - name: Run Style check
        run: "bun run format:check"
