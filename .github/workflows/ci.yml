name: ci

on:
    pull_request:
        branches: [main]

jobs:
    style:
        name: Prettier Check and Lint
        runs-on: ubuntu-latest

        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun ci

            - name: Run Style check
              run: "bun run format:check"

            - name: Lint
              run: bun run lint -- --max-warnings=0
