services:
    api:
        build:
            context: .
            dockerfile: Dockerfile
        restart: always
        env_file:
            - .env
        environment:
            POSTGRES_HOST: db
            POSTGRES_PORT: 5432
            REDIS_URL: redis://redis:6379
        ports:
            - "8001:8001"
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD",
                    "bun",
                    "-e",
                    "fetch('http://127.0.0.1:8001/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    worker-processor:
        build:
            context: .
            dockerfile: Dockerfile
        restart: always
        env_file:
            - .env
        command: ["bun", "run", "workers:processor"]
        environment:
            POSTGRES_HOST: db
            POSTGRES_PORT: 5432
            REDIS_URL: redis://redis:6379
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy

    worker-delivery:
        build:
            context: .
            dockerfile: Dockerfile
        restart: always
        env_file:
            - .env
        command: ["bun", "run", "workers:delivery"]
        environment:
            POSTGRES_HOST: db
            POSTGRES_PORT: 5432
            REDIS_URL: redis://redis:6379
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy

    db:
        image: postgres:latest
        container_name: my-postgres
        restart: always
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        container_name: redis
        image: redis:7-alpine
        restart: always
        ports:
            - "6379:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    pgdata:
